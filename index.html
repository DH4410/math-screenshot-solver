<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Solution</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            height: calc(100vh - 32px);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h1 { color: #667eea; font-size: 20px; }

        .section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
        }

        .section h3 { color: #667eea; font-size: 13px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .section p { color: #333; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }

        #detectedSection { max-height: 90px; flex-shrink: 0; }
        #solutionSection  { flex: 1; min-height: 0; }

        .hidden { display: none !important; }

        .loading { color: #667eea; font-style: italic; }
        .error   { color: #dc3545; }

        .buttons { display: flex; gap: 8px; flex-shrink: 0; }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary  { background: #667eea; color: white; }
        .btn-primary:hover  { background: #5568d3; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }

        button:disabled { opacity: 0.45; cursor: not-allowed; }
        button:active:not(:disabled) { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📐 Math Solution</h1>

        <div id="detectedSection" class="section hidden">
            <h3>Detected Text</h3>
            <p id="detectedText"></p>
        </div>

        <div id="solutionSection" class="section">
            <h3>Solution</h3>
            <p id="solutionText" class="loading">Waiting for screenshot…</p>
        </div>

        <div class="buttons">
            <button class="btn-primary"   id="captureBtn">📸 New Capture</button>
            <button class="btn-secondary" id="copyBtn" disabled>📋 Copy</button>
            <button class="btn-danger"    id="closeBtn">✕ Close</button>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
