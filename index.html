<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Solution</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 14px 16px 12px;
            border-bottom: 1px solid #e0e0e0;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header span {
            font-size: 14px;
            font-weight: 600;
            color: #111;
            letter-spacing: -0.01em;
        }

        header .status {
            font-size: 12px;
            font-weight: 400;
            color: #888;
        }

        .body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow: hidden;
        }

        .block {
            padding: 12px 16px;
            border-bottom: 1px solid #e8e8e8;
            background: #fff;
        }

        .block:last-child { border-bottom: none; }

        .label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 6px;
        }

        .text {
            font-size: 14px;
            color: #222;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #detectedSection { flex-shrink: 0; }
        #solutionSection  { flex: 1; overflow-y: auto; }

        .hidden { display: none !important; }

        .loading { color: #aaa; font-style: italic; }
        .error   { color: #c0392b; }

        footer {
            padding: 10px 12px;
            border-top: 1px solid #e0e0e0;
            background: #fff;
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #fff;
            color: #333;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }

        button:hover:not(:disabled) { background: #f0f0f0; }
        button:active:not(:disabled) { background: #e8e8e8; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #copyBtn { font-weight: 600; border-color: #bbb; }
    </style>
</head>
<body>
    <header>
        <span>Math Solver</span>
        <span class="status" id="statusLine">Ready</span>
    </header>

    <div class="body">
        <div class="block hidden" id="detectedSection">
            <div class="label">Detected text</div>
            <div class="text" id="detectedText"></div>
        </div>
        <div class="block" id="solutionSection">
            <div class="label">Solution</div>
            <div class="text loading" id="solutionText">Waiting for screenshot…</div>
        </div>
    </div>

    <footer>
        <button id="captureBtn">New capture</button>
        <button id="copyBtn" disabled>Copy answer</button>
        <button id="closeBtn">Close</button>
    </footer>

    <script src="renderer.js"></script>
</body>
</html>
