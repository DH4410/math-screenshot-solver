<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; width:100vw; height:100vh; cursor:crosshair; user-select:none; }

/* Screenshot fills the entire window as background */
#bg { position:fixed; inset:0; background-size:100% 100%; background-repeat:no-repeat; }

/* Semi-transparent dim layer over the screenshot (hidden once dragging starts) */
#dim { position:fixed; inset:0; background:rgba(0,0,0,0.38); }

#hint {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.65); color:#fff;
    padding:8px 20px; border-radius:6px;
    font-family:'Segoe UI',sans-serif; font-size:14px;
    pointer-events:none; white-space:nowrap; z-index:10;
}

/* Selection box: transparent inside, box-shadow dims everything outside */
#sel {
    position:fixed; display:none;
    border:2px solid #4fc3f7;
    background:transparent;
    box-shadow:0 0 0 9999px rgba(0,0,0,0.5);
    z-index:5;
}
</style>
</head>
<body>
<div id="bg"></div>
<div id="dim"></div>
<div id="hint">Drag to select &nbsp;·&nbsp; ESC to cancel</div>
<div id="sel"></div>
<script src="capture-renderer.js"></script>
</body>
</html>
